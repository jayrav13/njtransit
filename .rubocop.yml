plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Style/CommentedKeyword:
  Enabled: false

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"
    - "lib/njtransit/tasks.rb"

# HTTP client code tends to have longer classes/methods
Metrics/ClassLength:
  Exclude:
    - "lib/njtransit/client.rb"
    - "lib/njtransit/gtfs/database.rb"

Metrics/MethodLength:
  Exclude:
    - "lib/njtransit/client.rb"

Metrics/AbcSize:
  Exclude:
    - "lib/njtransit/client.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/njtransit/client.rb"

Metrics/ParameterLists:
  Exclude:
    - "lib/njtransit/client.rb"
    - "lib/njtransit/resources/bus.rb"

Naming/VariableNumber:
  CheckMethodNames: false

# GTFS database schema is inherently verbose
Metrics/ModuleLength:
  Exclude:
    - "lib/njtransit/gtfs/database.rb"

# RSpec cops — relax rules that fight gem test conventions
RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 4

RSpec/ExampleLength:
  Max: 10

RSpec/MultipleDescribes:
  Enabled: false

RSpec/BeforeAfterAll:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/VerifiedDoubles:
  Enabled: false

RSpec/IdenticalEqualityAssertion:
  Enabled: false

RSpec/ScatteredLet:
  Enabled: false
