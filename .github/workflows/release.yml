name: Release

on:
  push:
    branches: [main]
    paths:
      - "lib/njtransit/version.rb"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run tests
        run: bundle exec rspec

      - name: Extract version
        id: version
        run: |
          VERSION=$(ruby -r ./lib/njtransit/version -e 'puts NJTransit::VERSION')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build gem
        run: gem build njtransit.gemspec

      - name: Publish to RubyGems
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":rubygems_api_key: $RUBYGEMS_API_KEY" >> ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push njtransit-${{ steps.version.outputs.version }}.gem

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          GEM_FILE: njtransit-${{ steps.version.outputs.version }}.gem
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "$GEM_FILE"
