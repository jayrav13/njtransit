# Lefthook configuration for git hooks
# Install hooks: bundle exec lefthook install
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      run: bundle exec rubocop --force-exclusion {staged_files}
      stage_fixed: true

pre-push:
  commands:
    rspec:
      run: bundle exec rspec
